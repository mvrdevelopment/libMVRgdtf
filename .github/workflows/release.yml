# Important information: https://intuit.github.io/auto/docs/build-platforms/github-actions

name: Release on NPM

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to release from'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - beta
          - alpha
      dry_run:
        description: 'Dry run (no publish)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository under ./libMvrGdtf
        uses: actions/checkout@v4
        with:
          path: libMvrGdtf
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Set up branch tracking
        working-directory: libMvrGdtf
        run: |
          git checkout ${{ inputs.ref }}
          git branch --set-upstream-to=origin/${{ inputs.ref }} ${{ inputs.ref }}
          git pull --ff-only
          echo "=== branch ==="
          git branch --show-current
          echo "=== status ==="
          git status -sb

      - name: Override branch context for auto
        run: |
          # auto (env-ci) reads the branch from GITHUB_REF, which on a
          # workflow_dispatch is always the branch the workflow was launched
          # from (master), NOT the branch we checked out. We point both vars
          # at the selected ref so auto detects beta/alpha as a prerelease.
          echo "GITHUB_REF=refs/heads/${{ inputs.ref }}" >> "$GITHUB_ENV"
          echo "GITHUB_REF_NAME=${{ inputs.ref }}" >> "$GITHUB_ENV"

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          scope: '@mvrdevelopment'

      - name: Build
        uses: ./libMvrGdtf/.github/actions/build-lib

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: libMvrGdtf
        run: |
          npm install
          git config user.email "auto-release-bot@mvrdevelopment.com"
          git config user.name "Auto release bot"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx auto shipit --dry-run -vv
          else
            npx auto shipit -vv
          fi